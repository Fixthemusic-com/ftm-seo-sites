name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main, staging]
  schedule:
    # Nightly rebuild at 4am UTC
    - cron: '0 4 * * *'
  workflow_dispatch:

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        site:
          - id: weddingbandsitaly
            project: weddingbandsitaly
            token_secret: FTM_SITE_TOKEN_WBI

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build site
        env:
          SITE_ID: ${{ matrix.site.id }}
          FTM_API_BASE: https://www.fixthemusic.com
          FTM_SITE_TOKEN: ${{ secrets[matrix.site.token_secret] }}
          PUBLIC_FTM_API_BASE: https://www.fixthemusic.com
          PUBLIC_FTM_SITE_TOKEN: ${{ secrets[matrix.site.token_secret] }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ matrix.site.project }} --branch=${{ github.ref_name }}
